<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#16213e">
<title>🎵 ジュークボックス</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #eee; min-height: 100vh; padding: 16px 14px 90px;
  }
  header { text-align: center; margin-bottom: 18px; }
  h1 {
    font-size: 1.8rem;
    background: linear-gradient(90deg, #f9d423, #ff4e50);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sub { color: #9aa5c0; font-size: 0.82rem; margin-top: 6px; }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; align-items: center; margin-bottom: 12px;
  }
  .btn {
    background: #e94560; color: #fff; border: none; border-radius: 10px;
    padding: 11px 16px; font-size: 0.9rem; cursor: pointer;
    transition: transform .1s, background .2s;
  }
  .btn:active { transform: scale(.96); }
  .btn.secondary { background: #2d4059; }
  .btn.ghost { background: transparent; border: 1px solid #3d5573; }
  .search {
    padding: 11px 14px; border-radius: 10px; border: 1px solid #2d4059;
    background: #0f1b2d; color: #eee; font-size: 0.9rem; min-width: 150px; flex: 1; max-width: 260px;
  }
  label.loop { display: flex; align-items: center; gap: 6px; color: #9aa5c0; font-size: 0.82rem; cursor: pointer; }

  .editbar {
    display: none; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center;
    margin-bottom: 12px; padding: 10px; background: rgba(15,27,45,.6); border-radius: 12px; max-width: 640px; margin-left:auto; margin-right:auto;
  }
  body.editing .editbar { display: flex; }
  .editbar .hint { color:#9aa5c0; font-size:0.8rem; width:100%; text-align:center; }

  #status { text-align: center; color: #9aa5c0; font-size: 0.82rem; margin-bottom: 12px; min-height: 1.2em; }

  #grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px; max-width: 1100px; margin: 0 auto;
  }
  @media (max-width: 480px){ #grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; } }
  .pad {
    background: linear-gradient(145deg, #22335a, #1a2744);
    border: 1px solid #2f4570; border-radius: 14px; padding: 18px 12px;
    cursor: pointer; text-align: center; user-select: none; word-break: break-word;
    transition: transform .1s, box-shadow .2s, border-color .2s; position: relative;
  }
  .pad:active { transform: scale(.96); }
  .pad.playing {
    border-color: #f9d423; box-shadow: 0 0 0 2px #f9d423, 0 0 24px rgba(249,212,35,.5);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 2px #f9d423,0 0 18px rgba(249,212,35,.4);} 50%{ box-shadow:0 0 0 2px #f9d423,0 0 32px rgba(249,212,35,.8);} }
  .pad.paused { border-color: #f9d423; box-shadow: 0 0 0 2px rgba(249,212,35,.55); }
  .pad .icon { font-size: 1.7rem; margin-bottom: 8px; }
  .pad .name { font-size: 0.85rem; color: #dfe6f5; }

  /* 編集モード */
  body.editing .pad { cursor: default; }
  body.editing .pad:active { transform: none; }
  .pad .edit-area { display: none; }
  body.editing .pad .edit-area { display: block; }
  body.editing .pad .name { display: none; }
  body.editing .pad .icon { font-size: 1.2rem; margin-bottom: 6px; }
  .pad .rename {
    width: 100%; padding: 7px 8px; border-radius: 8px; border: 1px solid #3d5573;
    background: #0f1b2d; color: #fff; font-size: 0.82rem; text-align: center; margin-bottom: 8px;
  }
  .pad .moves { display: flex; gap: 6px; justify-content: center; }
  .pad .moves button {
    flex: 1; background: #2d4059; color: #fff; border: none; border-radius: 7px;
    padding: 6px 0; font-size: 0.95rem; cursor: pointer;
  }
  .pad .moves button:active { background: #3d5573; }
  .pad .moves button:disabled { opacity: .3; cursor: default; }
  .pad .grip { display: none; }
  body.editing .pad .grip {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    width: 100%; padding: 7px 0; margin-bottom: 8px;
    background: #1b2b4a; border: 1px dashed #3d5573; border-radius: 8px;
    color: #9aa5c0; font-size: 0.78rem; cursor: grab; touch-action: none; user-select: none;
  }
  body.editing .pad .grip:active { cursor: grabbing; background: #24375c; }
  body.editing .pad { cursor: grab; touch-action: none; }
  .pad.dragging {
    opacity: .95; transform: scale(1.06) rotate(1.5deg); cursor: grabbing;
    box-shadow: 0 18px 45px rgba(0,0,0,.65); border-color: #f9d423;
  }
  .placeholder {
    border: 2px dashed #f9d423; border-radius: 14px;
    background: rgba(249,212,35,.10);
  }
  body.dragging-active { touch-action: none; user-select: none; overflow: hidden; }

  .empty { text-align: center; color: #9aa5c0; margin-top: 50px; line-height: 1.9; padding: 0 10px; }
  .empty code { background: #0f1b2d; padding: 2px 8px; border-radius: 6px; color: #f9d423; }

  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,15,28,.96); backdrop-filter: blur(6px);
    border-top: 1px solid #2d4059; padding: 10px 14px;
    display: flex; align-items: center; gap: 12px;
    transform: translateY(120%); transition: transform .3s;
  }
  footer.show { transform: translateY(0); }
  #nowPlaying { flex: 1; font-size: 0.9rem; color: #f9d423; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .vol { display: flex; align-items: center; gap: 6px; color: #9aa5c0; font-size: 0.8rem; }
  input[type=range]{ accent-color: #e94560; width: 80px; }
</style>
</head>
<body>
<header>
  <h1>🎵 ジュークボックス</h1>
  <div class="sub">ボタンを押すと音が流れます</div>
</header>

<div class="toolbar">
  <input type="text" class="search" id="search" placeholder="🔍 曲名でしぼり込み…">
  <label class="loop"><input type="checkbox" id="loopChk"> 🔁 リピート</label>
  <button class="btn secondary" id="editBtn">✏️ 編集</button>
  <button class="btn ghost" id="pickBtn">📂 フォルダから読み込む</button>
  <input type="file" id="folderInput" webkitdirectory directory multiple accept="audio/*" hidden>
</div>

<div class="editbar" id="editbar">
  <div class="hint">名前を書き換え、◀ ▶ で並び替えできます（この端末に自動保存されます）</div>
  <button class="btn" id="doneBtn">✅ 完了</button>
  <button class="btn secondary" id="resetBtn">↩️ 初期状態に戻す</button>
  <button class="btn ghost" id="exportBtn">💾 並び順を書き出す</button>
</div>

<div id="status"></div>
<div id="grid"></div>
<div class="empty" id="emptyMsg" style="display:none"></div>

<footer id="footer">
  <button class="btn secondary" id="stopBtn">⏹ 停止</button>
  <div id="nowPlaying">—</div>
  <div class="vol">🔊 <input type="range" id="vol" min="0" max="1" step="0.05" value="0.9"></div>
</footer>

<audio id="player" playsinline></audio>

<script>
  const AUDIO_EXT = ['mp3','wav','m4a','ogg','flac','aac','opus','webm'];
  const SOUND_DIR = '音源';
  const LS_KEY = 'jukebox_custom_v1';
  const $ = id => document.getElementById(id);
  const grid = $('grid'), emptyMsg = $('emptyMsg'), statusEl = $('status');
  const player = $('player'), footer = $('footer'), nowPlaying = $('nowPlaying');
  const search = $('search'), loopChk = $('loopChk'), vol = $('vol');
  let baseTracks = [];   // manifest等から読んだ元の並び {file, name, url}
  let tracks = [];       // 表示用（並び替え・改名を反映）
  let currentFile = null;
  let paused = false;
  let editing = false;

  window.addEventListener('DOMContentLoaded', autoLoad);

  async function autoLoad() {
    if (location.protocol === 'file:') { showEmpty(true); return; }
    statusEl.textContent = '音源を読み込み中…';
    // 1) manifest.json
    try {
      const res = await fetch(SOUND_DIR + '/manifest.json', { cache: 'no-store' });
      if (res.ok) {
        const list = await res.json();
        setBase(list.map(normalizeEntry));
        if (baseTracks.length) { statusEl.textContent = ''; return; }
      }
    } catch (e) {}
    // 2) GitHub API
    try {
      const gh = detectGitHub();
      if (gh) {
        const api = `https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${encodeURIComponent(SOUND_DIR)}`;
        const res = await fetch(api);
        if (res.ok) {
          const items = await res.json();
          const names = items.filter(i => i.type === 'file' && isAudio(i.name)).map(i => i.name);
          setBase(names.map(n => ({ file: n, title: null })));
          if (baseTracks.length) { statusEl.textContent = ''; return; }
        }
      }
    } catch (e) {}
    statusEl.textContent = ''; showEmpty(true);
  }

  function normalizeEntry(e){ return (typeof e === 'string') ? { file: e, title: null } : { file: e.file, title: e.title || null }; }
  function isAudio(name){ return AUDIO_EXT.includes(name.split('.').pop().toLowerCase()); }
  function detectGitHub() {
    const host = location.hostname;
    if (!host.endsWith('github.io')) return null;
    const owner = host.split('.')[0];
    const seg = location.pathname.split('/').filter(Boolean);
    const repo = seg.length ? seg[0] : owner + '.github.io';
    return { owner, repo };
  }

  function setBase(entries) {
    baseTracks = entries.filter(e => isAudio(e.file)).map(e => ({
      file: e.file,
      name: e.title || e.file.replace(/\.[^.]+$/, ''),
      url: SOUND_DIR + '/' + encodeURIComponent(e.file)
    }));
    applyCustom();
    render();
  }

  // localStorage の順序・名前を反映
  function applyCustom() {
    const custom = loadCustom();
    const byFile = Object.fromEntries(baseTracks.map(t => [t.file, {...t}]));
    let ordered = [];
    if (custom && custom.order) {
      custom.order.forEach(f => { if (byFile[f]) { ordered.push(byFile[f]); delete byFile[f]; } });
    }
    Object.values(byFile).forEach(t => ordered.push(t)); // 新規ファイルは末尾へ
    if (custom && custom.titles) ordered.forEach(t => { if (custom.titles[t.file]) t.name = custom.titles[t.file]; });
    tracks = ordered;
  }

  function loadCustom(){ try { return JSON.parse(localStorage.getItem(LS_KEY)); } catch(e){ return null; } }
  function saveCustom() {
    const data = { order: tracks.map(t => t.file), titles: {} };
    tracks.forEach(t => {
      const def = t.file.replace(/\.[^.]+$/, '');
      if (t.name !== def) data.titles[t.file] = t.name;
    });
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  }

  // PCのフォルダから読み込む
  $('pickBtn').onclick = () => $('folderInput').click();
  $('folderInput').addEventListener('change', (e) => {
    const files = [...e.target.files].filter(f => isAudio(f.name))
      .sort((a,b)=>a.name.localeCompare(b.name,'ja'));
    baseTracks = files.map(f => ({ file: f.name, name: f.name.replace(/\.[^.]+$/, ''), url: URL.createObjectURL(f) }));
    applyCustom(); statusEl.textContent = ''; render();
  });

  function render() {
    grid.innerHTML = '';
    if (tracks.length === 0) { showEmpty(true); return; }
    showEmpty(false);
    const q = search.value.trim().toLowerCase();
    const list = editing ? tracks : tracks.filter(t => t.name.toLowerCase().includes(q));
    if (list.length === 0) { grid.innerHTML = '<div class="empty" style="grid-column:1/-1">該当する曲がありません</div>'; return; }
    list.forEach((t) => {
      const idx = tracks.indexOf(t);
      const pad = document.createElement('div');
      const active = t.file === currentFile;
      pad.className = 'pad' + (active ? (paused ? ' paused' : ' playing') : '');
      pad.dataset.file = t.file;
      const icon = document.createElement('div'); icon.className = 'icon';
      icon.textContent = active ? (paused ? '▶️' : '⏸️') : '🎵';
      const name = document.createElement('div'); name.className = 'name'; name.textContent = t.name;
      pad.appendChild(icon); pad.appendChild(name);

      // 編集エリア
      const ea = document.createElement('div'); ea.className = 'edit-area';
      const grip = document.createElement('div'); grip.className = 'grip'; grip.textContent = '⠿ どこでも掴んで移動';
      const inp = document.createElement('input'); inp.className = 'rename'; inp.value = t.name;
      inp.addEventListener('click', e => e.stopPropagation());
      inp.addEventListener('input', () => { t.name = inp.value; name.textContent = inp.value; saveCustom(); });
      const moves = document.createElement('div'); moves.className = 'moves';
      const left = document.createElement('button'); left.textContent = '◀'; left.title='前へ';
      const right = document.createElement('button'); right.textContent = '▶'; right.title='後ろへ';
      left.disabled = idx === 0; right.disabled = idx === tracks.length - 1;
      left.addEventListener('click', e => { e.stopPropagation(); move(idx, -1); });
      right.addEventListener('click', e => { e.stopPropagation(); move(idx, 1); });
      moves.appendChild(left); moves.appendChild(right);
      ea.appendChild(grip); ea.appendChild(inp); ea.appendChild(moves); pad.appendChild(ea);

      pad.addEventListener('pointerdown', e => startDrag(e, pad));
      pad.addEventListener('click', () => { if (!editing) toggle(t); });
      grid.appendChild(pad);
    });
  }

  function move(idx, dir) {
    const j = idx + dir;
    if (j < 0 || j >= tracks.length) return;
    [tracks[idx], tracks[j]] = [tracks[j], tracks[idx]];
    saveCustom(); render();
  }

  // ドラッグ&ドロップ並び替え（箱ごと指について動く／マウス・タッチ両対応）
  let drag = null; // { el, ph, offsetX, offsetY }
  function startDrag(e, pad) {
    if (!editing || drag) return;
    // 名前の入力欄と ◀▶ ボタンの上からは掴まない
    if (e.target.closest('.rename') || e.target.closest('.moves')) return;
    e.preventDefault();
    const r = pad.getBoundingClientRect();
    // 空いた場所に点線の枠を置く
    const ph = document.createElement('div');
    ph.className = 'placeholder';
    ph.style.height = r.height + 'px';
    grid.insertBefore(ph, pad);
    // 箱を浮かせて指に追従させる
    pad.classList.add('dragging');
    pad.style.position = 'fixed';
    pad.style.width = r.width + 'px';
    pad.style.height = r.height + 'px';
    pad.style.left = r.left + 'px';
    pad.style.top = r.top + 'px';
    pad.style.zIndex = '1000';
    pad.style.pointerEvents = 'none';
    drag = { el: pad, ph, offsetX: e.clientX - r.left, offsetY: e.clientY - r.top };
    document.body.classList.add('dragging-active');
    document.addEventListener('pointermove', onDragMove, { passive: false });
    document.addEventListener('pointerup', endDrag);
    document.addEventListener('pointercancel', endDrag);
  }

  function onDragMove(e) {
    if (!drag) return;
    e.preventDefault();
    const x = e.clientX, y = e.clientY;
    // 箱を指の位置へ
    drag.el.style.left = (x - drag.offsetX) + 'px';
    drag.el.style.top = (y - drag.offsetY) + 'px';
    // 点線枠(落ちる場所)を決める：各ボタンの中心と指の位置を読み順で比較
    const sibs = [...grid.children].filter(c => c !== drag.el && c !== drag.ph);
    let insertBefore = null;
    for (const p of sibs) {
      const r = p.getBoundingClientRect();
      if (y < r.top) { insertBefore = p; break; }                              // 上の行にいる
      if (y <= r.bottom && x < r.left + r.width / 2) { insertBefore = p; break; } // 同じ行で中心より左
    }
    grid.insertBefore(drag.ph, insertBefore); // 該当なし(=末尾)なら null で末尾へ
  }

  function endDrag() {
    if (!drag) return;
    const { el, ph } = drag;
    // 点線枠の場所に箱を収める
    el.classList.remove('dragging');
    el.style.cssText = '';
    grid.insertBefore(el, ph);
    ph.remove();
    document.body.classList.remove('dragging-active');
    document.removeEventListener('pointermove', onDragMove);
    document.removeEventListener('pointerup', endDrag);
    document.removeEventListener('pointercancel', endDrag);
    drag = null;
    // DOMの並び順から tracks を作り直す
    const order = [...grid.querySelectorAll('.pad')].map(p => p.dataset.file);
    tracks = order.map(f => tracks.find(t => t.file === f)).filter(Boolean);
    saveCustom(); render();
  }

  function showEmpty(show) {
    if (!show) { emptyMsg.style.display = 'none'; return; }
    emptyMsg.style.display = 'block';
    emptyMsg.innerHTML = location.protocol === 'file:'
      ? `下の <b>「📂 フォルダから読み込む」</b> を押して <code>音源</code> フォルダを選んでください。`
      : `音源が見つかりませんでした。<code>音源</code> フォルダに音楽ファイルを入れてください。`;
  }

  // ボタンを押すたびに 再生 ⇔ 一時停止 を切り替え
  function toggle(track) {
    if (currentFile === track.file) {
      if (player.paused) { player.play().catch(()=>{}); paused = false; }
      else { player.pause(); paused = true; }
      updateNowPlaying(track); render();
    } else {
      play(track);
    }
  }

  function play(track) {
    player.src = track.url;
    player.loop = loopChk.checked;
    player.volume = parseFloat(vol.value);
    player.play().catch(()=>{});
    currentFile = track.file; paused = false;
    updateNowPlaying(track); render();
  }

  function updateNowPlaying(track) {
    nowPlaying.textContent = (paused ? '⏸ ' : '▶ ') + track.name + (paused ? '（一時停止中）' : '');
    footer.classList.add('show');
  }

  $('stopBtn').onclick = () => {
    player.pause(); player.currentTime = 0;
    currentFile = null; paused = false; nowPlaying.textContent = '—';
    footer.classList.remove('show'); render();
  };
  player.addEventListener('ended', () => { if (!player.loop) { currentFile = null; paused = false; render(); } });

  // 編集モード
  $('editBtn').onclick = () => { editing = true; document.body.classList.add('editing'); render(); };
  $('doneBtn').onclick = () => { editing = false; document.body.classList.remove('editing'); saveCustom(); render(); };
  $('resetBtn').onclick = () => {
    if (!confirm('名前と並び順を初期状態に戻します。よろしいですか？')) return;
    localStorage.removeItem(LS_KEY); applyCustom(); render();
  };
  $('exportBtn').onclick = () => {
    const data = tracks.map(t => ({ file: t.file, title: t.name }));
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'manifest.json'; a.click();
    URL.revokeObjectURL(a.href);
    alert('manifest.json を書き出しました。\nこれをGitHubの「音源」フォルダに置き換えると、全員の初期状態になります。');
  };

  loopChk.addEventListener('change', () => { player.loop = loopChk.checked; });
  vol.addEventListener('input', () => { player.volume = parseFloat(vol.value); });
  search.addEventListener('input', () => { if (!editing) render(); });
</script>
</body>
</html>
